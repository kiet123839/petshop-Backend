server:
  port: 8080

spring:
  application:
    name: petshop-auth

  datasource:
    url: jdbc:sqlserver://localhost;instanceName=SQLEXPRESS;databaseName=PETSHOP_DB;encrypt=false;trustServerCertificate=true
    username: sa
    password: 123456
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver

  jpa:
    database-platform: org.hibernate.dialect.SQLServerDialect
    hibernate:
      ddl-auto: none
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: true
    properties:
      hibernate:
        format_sql: true

jwt:
  secret: petshop-super-secret-key-2024-very-long-and-secure-do-not-share
  expiration: 86400000